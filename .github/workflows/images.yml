name: Build & Push Liquidator Images

on:
  push:
    branches: [main, dev, DEV]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: sentinel
            image: liquidator-sentinel
            dockerfile: ./src/sentinel/Dockerfile
          - name: executor
            image: liquidator-executor
            dockerfile: ./src/executor/Dockerfile
          - name: commander
            image: liquidator-commander
            dockerfile: ./src/commander/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image + tags (lowercase owner)
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${{ matrix.service.image }}"
          TAG="${GITHUB_REF_NAME}"

          echo "image=${IMAGE}"
