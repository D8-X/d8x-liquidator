- name: Compute image + tags
  id: meta
  shell: bash
  run: |
    set -euo pipefail
    OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
    IMAGE="ghcr.io/${OWNER}/${{ matrix.service.image }}"
    TAG="${GITHUB_REF_NAME}"

    echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
    echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

    echo "Using image: ${IMAGE}"
    echo "Using tag:   ${TAG}"

- name: Verify NODE_AUTH_TOKEN secret is present
  shell: bash
  run: |
    if [ -z "${{ secrets.NODE_AUTH_TOKEN }}" ]; then
      echo "Missing secret NODE_AUTH_TOKEN (needed to install @d8-x packages from GitHub Packages)."
      exit 1
    fi

- name: Build and push
  uses: docker/build-push-action@v6
  with:
    context: .
    file: ${{ matrix.service.dockerfile }}
    push: true
    tags: |
      ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
      ${{ steps.meta.outputs.image }}:${{ github.sha }}
    cache-from: type=gha
    cache-to: type=gha,mode=max
    secrets: |
      npm_token=${{ secrets.NODE_AUTH_TOKEN }}
