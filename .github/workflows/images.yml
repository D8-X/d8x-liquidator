name: Build & Push Images

on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: liquidator-sentinel
            dockerfile: ./src/sentinel/Dockerfile
          - name: liquidator-executor
            dockerfile: ./src/executor/Dockerfile
          - name: liquidator-commander
            dockerfile: ./src/commander/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository }}-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npm_token=${{ secrets.NODE_AUTH_TOKEN }}
