# sudo docker compose up --build -d
name: d8x

services:
  # Redis for Pub/Sub between blockchain listener (pub) and liquidators (sub)
  cache:
    image: redis:6.2-alpine
    restart: always
    ports:
      - "127.0.0.1:${REDIS_PORT}:${REDIS_PORT}"
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    # environment:
    #   REDIS_ID: ${REDIS_ID}

  # Listen to block and events, and stream on redis
  sentinel-bartio:
    build:
      context: .
      dockerfile: ./src/sentinel/Dockerfile
    depends_on:
      - cache
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 0
      SDK_CONFIG: bartio
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  sentinel-bera:
    build:
      context: .
      dockerfile: ./src/sentinel/Dockerfile
    depends_on:
      - cache
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 1
      SDK_CONFIG: bera
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  # Account manager: fetches and distributes data to liquidators
  commander-bartio:
    depends_on:
      - cache
    build:
      context: .
      dockerfile: ./src/commander/Dockerfile
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 0
      SDK_CONFIG: bartio
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  commander-bera:
    depends_on:
      - cache
    build:
      context: .
      dockerfile: ./src/commander/Dockerfile
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 1
      SDK_CONFIG: bera
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  # liquidator: submits liquidate calls to the blockchain
  executor-bartio:
    depends_on:
      - cache
      - commander-bartio
    build:
      context: .
      dockerfile: ./src/executor/Dockerfile
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 0
      SDK_CONFIG: bartio
      SEED_PHRASE: ${SEED_PHRASE}
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  executor-bera:
    depends_on:
      - cache
      - commander-bera
    build:
      context: .
      dockerfile: ./src/executor/Dockerfile
    environment:
      REDIS_HOST: cache
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ID: 1
      SDK_CONFIG: bera
      SEED_PHRASE: ${SEED_PHRASE}
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  # Prometheus with alertmanager
  prometheus:
    image: prom/prometheus:latest
    command: [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/prometheus",
        "--web.console.libraries=/usr/share/prometheus/console_libraries",
        "--web.console.templates=/usr/share/prometheus/consoles",
        # Enable external label expansion
        "--enable-feature=expand-external-labels",
      ]
    ports:
      - 127.0.0.1:9090:9090
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_yaml
        target: /etc/prometheus/prometheus.yml
      - source: rules_1
        target: /etc/prometheus/rules/executor.rules.yaml
    restart: always
    environment:
      PROMETHEUS_DEPLOYMENT_NAME: ${PROMETHEUS_DEPLOYMENT_NAME}
      PROMETHEUS_SERVER_IP: ${PROMETHEUS_SERVER_IP}
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - 127.0.0.1:9093:9093
    restart: always
    configs:
      - source: alertmanager_slack_url
        target: /etc/alertmanager/slack_api_url.txt
      - source: alertmanager_yaml
        target: /etc/alertmanager/alertmanager.yml
volumes:
  prometheus_data:
configs:
  prometheus_yaml:
    file: ./prometheus_configs/prometheus.yaml
  alertmanager_slack_url:
    file: ./prometheus_configs/prometheus_alertmanager_slack_url.txt
  alertmanager_yaml:
    file: ./prometheus_configs/prometheus_alertmanager.yaml
  rules_1:
    file: ./prometheus_configs/liquidator.rules.yaml
